<!--
  The Footer
-->

<footer class="d-flex w-100 justify-content-center">
  <div class="d-flex justify-content-between align-items-center">
    <div class="footer-left">
      <p class="mb-0">
        © {{ 'now' | date: "%Y" }}
        <a href="{{ site.social.links[0] | default: '/' }}">{{ site.author.name | default: site.title }}</a>.
        <span data-toggle="tooltip" data-placement="top" title="All rights reserved.">所有權利保留。</span>
      </p>
    </div>

    <div class="footer-middle">
      <p class="mb-0">
        <script async src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
        <span id="busuanzi_container_site_pv" style="display:none">
          總訪問量 <span id="busuanzi_value_site_pv"></span> 次
        </span>
        &nbsp;|&nbsp;
        <span id="busuanzi_container_site_uv" style="display:none">
          訪客數 <span id="busuanzi_value_site_uv"></span> 人
        </span>
      </p>
    </div>

    <div class="footer-right">
      <p class="mb-0">
        Powered by
        <a href="https://jekyllrb.com" target="_blank" rel="noopener">Jekyll</a>
        &
        <a href="https://github.com/cotes2020/jekyll-theme-chirpy" target="_blank" rel="noopener">Chirpy</a>
      </p>
    </div>
  </div>
</footer>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/ai-math/sw.js').then((reg) => {
        console.log('PWA Service Worker registered with scope:', reg.scope);
      }).catch((err) => {
        console.error('Service Worker registration failed:', err);
      });
    });
  }

  // Inject manifest link dynamically to ensure fallback
  if (!document.querySelector('link[rel="manifest"]')) {
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = '/ai-math/manifest.json';
    document.head.appendChild(link);
  }
</script>
